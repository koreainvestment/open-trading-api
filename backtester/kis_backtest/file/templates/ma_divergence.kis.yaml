version: "1.0"

metadata:
  name: "이동평균 이격도 (MA Divergence Ratio)"
  description: "주가가 이동평균 대비 일정 비율 이하로 이격되면 매수, 일정 비율 이상 이격되면 매도"
  author: "kis_backtest"
  tags:
    - mean_reversion
    - divergence
    - sma
    - ratio

strategy:
  id: ma_divergence
  category: mean_reversion

  params:
    period:
      default: 20
      min: 10
      max: 60
      type: int
      description: "이동평균 기간"
    buy_ratio:
      default: 0.9
      min: 0.8
      max: 0.95
      type: float
      description: "매수 이격도 (price/SMA)"
    sell_ratio:
      default: 1.1
      min: 1.05
      max: 1.2
      type: float
      description: "매도 이격도 (price/SMA)"

  indicators:
    - id: sma
      alias: ma
      params:
        period: $period

  entry:
    logic: AND
    conditions:
      - indicator: close
        operator: less_than
        compare_to: ma

  exit:
    logic: AND
    conditions:
      - indicator: close
        operator: greater_than
        compare_to: ma

risk:
  stop_loss:
    enabled: false
